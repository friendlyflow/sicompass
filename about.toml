# Configuration for `cargo about` — generates the third-party attribution file.
#
# Regenerate the attribution file with:
#   cargo about generate about.hbs > THIRD-PARTY-LICENSES.html
#
# `accepted` lists every SPDX license that is allowed to appear in the
# dependency tree. `cargo about` fails if a dependency uses anything else,
# which is the early-warning signal if a future dependency pulls in GPL/AGPL
# or another license incompatible with the proprietary arm of the dual license.

# Only consider licenses for the platforms we actually ship binaries for.
targets = [
    "x86_64-unknown-linux-gnu",
]

# Build-only dependencies are not distributed in the binary.
ignore-build-dependencies = true

# Dev-dependencies (test mocks etc.) are not distributed either.
ignore-dev-dependencies = true

accepted = [
    # Permissive — fully compatible with both the proprietary and GPLv3 arms.
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
    "Unicode-3.0",
    "CC0-1.0",
    "NCSA",
    "CDLA-Permissive-2.0",
    # Weak (file-level) copyleft — safe to bundle in a proprietary binary as
    # long as the crate's own source files are not modified. See LICENSE notes.
    "MPL-2.0",
    # Appears only inside disjunctions (e.g. "MIT OR Apache-2.0 OR
    # LGPL-2.1-or-later"); a permissive alternative is always selected.
    "LGPL-2.1-or-later",
]

# Workspace crates are first-party (marked `publish = false`); they are
# covered by sicompass's own dual license, not by this attribution file.
# `private.ignore` skips them so their `GPL-3.0-only` manifest entry does
# not trip the allowlist above.
[private]
ignore = true

# sicompass-sdk is first-party — sicompass's own SDK, published to crates.io
# under GPL-3.0-only just like the app. It is not third-party code to vet, but
# because it is consumed as a *published* crate (not a publish=false workspace
# member) the `private.ignore` above does not catch it. cargo-about has no
# per-crate "skip", so accept its GPL here SCOPED TO THIS CRATE ONLY. The
# global `accepted` list above stays GPL-free, so any *other* dependency that
# pulls in GPL/AGPL still trips the gate as intended.
[sicompass-sdk]
accepted = ["GPL-3.0-only"]

# miniz_oxide ships two MIT license files (`LICENSE` and `LICENSE-MIT.md`)
# with identical wording but different blank-line spacing. Without this
# clarification cargo-about picks whichever the filesystem lists first, so
# the generated attribution file flip-flops between machines. Pin the MIT
# file explicitly so output is reproducible everywhere.
[miniz_oxide.clarify]
license = "MIT"

[[miniz_oxide.clarify.files]]
path = "LICENSE-MIT.md"
checksum = "799e9ca9d179295ef372f25d3769cdda7d25bb2668add6a6a1e22d1e4c678b8d"
