name: Release on tag

# Bridges `git push` of a `v*.*.*` tag to the cargo-dist `Release` workflow,
# which is configured for `dispatch-releases = true` (manual-only) in
# dist-workspace.toml. Keeps the autogenerated release.yml untouched so a
# future `dist generate` does not clobber the trigger.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Dispatch Release workflow with this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref "${GITHUB_REF_NAME}" -f tag="${GITHUB_REF_NAME}"
