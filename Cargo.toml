[workspace]
members = [
    "sdk-rs",
    "lib/lib_tutorial-rs",
    "lib/lib_settings-rs",
    "lib/lib_filebrowser-rs",
    "lib/lib_webbrowser-rs",
    "lib/lib_chatclient-rs",
    "lib/lib_emailclient-rs",
    "src/sicompass-rs",
    "src/desicompass-rs",
    "src/loginsicompass-rs",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
# SDK
sicompass-sdk = { path = "sdk-rs" }
sicompass-tutorial = { path = "lib/lib_tutorial-rs" }
sicompass-settings = { path = "lib/lib_settings-rs" }
sicompass-filebrowser = { path = "lib/lib_filebrowser-rs" }
sicompass-webbrowser = { path = "lib/lib_webbrowser-rs" }
sicompass-chatclient = { path = "lib/lib_chatclient-rs" }
sicompass-emailclient = { path = "lib/lib_emailclient-rs" }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Graphics
ash = "0.38"
glam = "0.29"

# Text rendering
freetype = "0.7"
rustybuzz = "0.20"

# Image loading
image = { version = "0.25", features = ["jpeg", "png", "webp"] }

# Windowing + events
sdl3 = "0.12"

# Accessibility
accesskit = "0.16"
accesskit_unix = "0.12"

# Unicode
unicode-normalization = "0.1"

# Async / networking (library providers, later phases)
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "blocking"] }

# HTML parsing
scraper = "0.22"

# URL handling
url = "2"

# Plugin loading
libloading = "0.8"

# Test dependencies
mockall = "0.13"
tempfile = "3"
wiremock = "0.6"

# Optimize heavy third-party deps even in debug builds — html5ever and the
# TLS/HTTP stack are 10-50x slower without optimizations.
[profile.dev.package.html5ever]
opt-level = 2
[profile.dev.package.scraper]
opt-level = 2
[profile.dev.package.reqwest]
opt-level = 2
[profile.dev.package.hyper]
opt-level = 2
[profile.dev.package.hyper-util]
opt-level = 2
[profile.dev.package.rustls]
opt-level = 2
[profile.dev.package.ring]
opt-level = 2
