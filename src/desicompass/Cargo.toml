[package]
name = "desicompass"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "desicompass — Wayland compositor (Rust/smithay port of src/desicompass/)"

[[bin]]
name = "desicompass"
path = "src/main.rs"

[target.'cfg(target_os = "linux")'.dependencies]
# Smithay: Wayland compositor framework.
# backend_winit  — run inside an existing X11/Wayland session (development).
# backend_egl    — EGL context used by the winit + gles backend.
# renderer_gl    — GlesRenderer for rendering to the winit window.
# use_system_lib — link against system wayland/xkb C libraries.
# desktop        — Space + Window layout helpers.
# wayland_frontend — server-side Wayland protocol implementations.
smithay = { version = "0.7", default-features = false, features = [
    "desktop",
    "wayland_frontend",
    "backend_winit",
    "backend_egl",
    "renderer_gl",
    "use_system_lib",
] }

# Logging
tracing          = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Command-line argument parsing
clap = { version = "4", features = ["derive"] }
