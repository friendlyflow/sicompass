[package]
publish = false  # internal crate, never published to crates.io
name = "sicompass"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "sicompass — Vulkan/SDL3 modal UI (Rust port)"
repository = "https://github.com/friendlyflow/sicompass"
authors = ["Nico Verrijdt <nico@friendlyflow.com>"]

[[bin]]
name = "sicompass"
path = "src/main.rs"

[lib]
name = "sicompass"
path = "src/lib.rs"

# This crate is `publish = false` (never goes to crates.io), which by default
# also hides it from cargo-dist. Opt the binary back into release builds.
[package.metadata.dist]
dist = true

[package.metadata.wix]
upgrade-guid = "0865D57F-AEA6-4BCA-AB03-543D1EE69091"
path-guid = "3D255495-2455-4CAB-8782-168EF8D5E8A7"
license = false
eula = false

[features]
# Build SDL3 from its vendored source and link it statically, so the resulting
# binary is self-contained (no system SDL3 / SDL3.dll / libSDL3.dylib needed).
# Off by default — local dev builds keep linking the system SDL3. Release
# builds enable it (see `[workspace.metadata.dist] features` in the root
# Cargo.toml). Building from source needs `cmake` and a C compiler on PATH.
#
# `no-sdl-libc` makes SDL3 use its own SDL_atof/SDL_sinf/etc. implementations
# instead of calling into the C runtime. Required on Windows MSVC: the bundled
# sdl3-sys + cmake 0.1.58 stack doesn't propagate Rust's static-CRT choice to
# SDL3's CMake build, so SDL3 ends up compiled with /MD (dynamic CRT) while
# rustc links /MT (static CRT). The resulting `__imp_atof`-style unresolved
# externals break the release link. Cutting SDL's libc dependency sidesteps
# the mismatch and keeps the binary truly standalone (no vcruntime140.dll).
bundled-sdl3 = ["sdl3/build-from-source-static", "sdl3-sys/no-sdl-libc"]

# Build FreeType from its vendored source (via cmake) instead of locating a
# system freetype2 through pkg-config. Off by default — local dev builds keep
# using the system freetype. Release builds enable it (see the dist `features`
# list), because the Windows runner has no pkg-config/system freetype and
# freetype-sys 0.23 dropped the implicit bundled build that 0.20 did by default.
# Same rationale and build requirements (cmake + C compiler) as `bundled-sdl3`.
bundled-freetype = ["freetype-sys/bundled"]

[dependencies]
sicompass-sdk = { workspace = true }
sicompass-builtins = { workspace = true }
sicompass-updater = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
semver = { workspace = true }

ash = { workspace = true }
glam = { workspace = true }

freetype = { workspace = true }
# Pulled in transitively by `freetype`; declared here so the `bundled-freetype`
# feature can flip its `bundled` knob (see the feature comment above).
# Version constraint matches `freetype`'s own pin so Cargo unifies to one copy.
freetype-sys = "0.23"
rustybuzz = { workspace = true }

image = { workspace = true }
base64 = { workspace = true }

sdl3 = { workspace = true }
# Pulled in transitively by `sdl3`; declared here so the `bundled-sdl3`
# feature can flip its `no-sdl-libc` knob (see the feature comment above).
# Version constraint matches `sdl3`'s own pin so Cargo unifies to one copy.
sdl3-sys = "0.6.7"

accesskit = { workspace = true }

whatlang = { workspace = true }

unicode-normalization = { workspace = true }

nucleo-matcher = { workspace = true }

tokio = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

libloading = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
accesskit_unix = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
accesskit_windows = { workspace = true }
windows = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
accesskit_macos = { workspace = true }

[build-dependencies]
winres = { workspace = true }

[dev-dependencies]
sicompass-builtins = { workspace = true }
sicompass-settings = { workspace = true }
sicompass-filebrowser = { workspace = true }
sicompass-tutorial = { workspace = true }
sicompass-webbrowser = { workspace = true }
sicompass-chatclient = { workspace = true }
sicompass-emailclient = { workspace = true }
sicompass-remote = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
