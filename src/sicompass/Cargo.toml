[package]
name = "sicompass"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "sicompass — Vulkan/SDL3 modal UI (Rust port)"

[[bin]]
name = "sicompass"
path = "src/main.rs"

[lib]
name = "sicompass"
path = "src/lib.rs"

[dependencies]
sicompass-sdk = { workspace = true }
sicompass-builtins = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }

ash = { workspace = true }
glam = { workspace = true }

freetype = { workspace = true }
rustybuzz = { workspace = true }

image = { workspace = true }

sdl3 = { workspace = true }

accesskit = { workspace = true }

unicode-normalization = { workspace = true }

nucleo-matcher = { workspace = true }

tokio = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

libloading = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
accesskit_unix = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
accesskit_windows = { workspace = true }
windows = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
accesskit_macos = { workspace = true }

[build-dependencies]
winres = { workspace = true }

[dev-dependencies]
sicompass-builtins = { workspace = true }
sicompass-settings = { workspace = true }
sicompass-filebrowser = { workspace = true }
sicompass-tutorial = { workspace = true }
sicompass-webbrowser = { workspace = true }
sicompass-chatclient = { workspace = true }
sicompass-emailclient = { workspace = true }
sicompass-remote = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
