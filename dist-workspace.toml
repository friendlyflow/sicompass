[workspace]
members = ["cargo:."]

# Config for 'dist' (cargo-dist). Regenerate release.yml after editing with:
#   dist generate
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backend
ci = "github"
# Trigger the release from the GitHub web UI (Actions -> Release -> Run
# workflow) instead of on a tag push / commit.
dispatch-releases = true
# Windows only for now. macOS (aarch64 + x86_64) is parked until the
# deployment-target / link issues are sorted; re-add the two
# *-apple-darwin targets here and regenerate. Linux is released
# separately by release-linux.yml.
targets = [
    "x86_64-pc-windows-msvc",
]
# End-user installers: a PowerShell script and an MSI package (Windows).
# The curl|sh "shell" installer is macOS/Linux only, so it is dropped
# until the macOS targets come back.
installers = ["powershell", "msi"]
# Build with the bundled-* features so SDL3 and FreeType are compiled from
# source and statically linked — the release binaries are self-contained, with
# no system SDL3 / freetype and nothing for the user to install. Needed on the
# Windows runner, which has neither pkg-config nor a system freetype.
features = ["bundled-sdl3", "bundled-freetype"]
# Ship the third-party attribution file inside every release archive.
include = ["THIRD-PARTY-LICENSES.html"]
